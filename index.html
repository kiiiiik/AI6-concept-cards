<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrousel 3D Preven6 - Final Concept</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            padding: 0;
            background-color: #ffffff; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
        }

        /* --- STYLE DU LOADER MINI (40px) --- */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #dot-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 4px; 
            width: 40px; 
            height: 40px;
        }

        .dot {
            width: 100%; height: 100%;
            background-color: #001DFC;
            border-radius: 50%;
            transition: background-color 0.3s ease, transform 0.3s ease, opacity 0.6s ease; 
        }

        .dot.ripple {
            background-color: #00FFFF;
            transform: scale(1.2);
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        .dot.erase { opacity: 0; transform: scale(0.3); }
        .loader-hidden { opacity: 0; visibility: hidden; }

        /* --- CONTAINER DYNAMIQUE SCALABLE --- */
        #card-arc-container {
            position: relative;
            width: 100vw;
            height: 75vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            isolation: isolate; 
            overflow: hidden; 
            /* Masque dégradé sur les côtés */
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        #card-arc-container.visible { opacity: 1; }

        model-viewer {
            position: absolute;
            /* Scaling dynamique avec sécurité minimum pour mobile */
            width: max(280px, 28vw); 
            height: max(420px, 42vw); 
            bottom: -5vh;
            --poster-color: transparent;
            transform-origin: center center;
            backface-visibility: hidden;
            will-change: transform;
            contain: layout; 
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            pointer-events: none; 
        }

        .hitbox {
            position: absolute;
            top: 50%; left: 50%;
            width: max(180px, 18vw); 
            height: max(280px, 28vw);
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto; 
            background: transparent;
            z-index: 10;
        }

        /* Effet de survol (Hover) */
        model-viewer:has(.hitbox:hover) {
            transform: translate(var(--pos-x), calc(var(--pos-y) - 60px)) rotate(var(--rot-z)) translateZ(60px) !important;
            filter: var(--current-blur) !important; 
        }

        @media (max-width: 480px) {
            model-viewer { width: 250px; height: 375px; }
        }
    </style>
</head>
<body>

    <div id="loader"><div id="dot-grid"></div></div>
    <div id="card-arc-container"></div>

    <script>
        const container = document.getElementById('card-arc-container');
        const loader = document.getElementById('loader');
        const dotGrid = document.getElementById('dot-grid');
        const numberOfCards = 12; 
        
        // Rayon dynamique (45% de la largeur, min 400px pour mobile)
        const getDynamicRadius = () => Math.max(window.innerWidth * 0.45, 400);
        let finalRadius = getDynamicRadius();
        
        const baseSpeed = 0.07;
        let currentSpeed = 1.5; // Impulsion de départ
        const friction = 0.985; // Ralentissement fluide
        
        let cardsData = [];
        let mousePos = { x: 0, y: 0 };
        let animationActive = false;
        let loaderInt;

        // --- GÉNÉRATION DU LOADER ---
        const dots = [];
        for (let r = 0; r < 5; r++) {
            for (let c = 0; c < 5; c++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dotGrid.appendChild(dot);
                dots.push({ element: dot, dist: Math.abs(r - 2) + Math.abs(c - 2) });
            }
        }

        function runLoaderRipple() {
            dots.forEach(d => d.element.classList.remove('ripple'));
            [{d:0,t:0},{d:1,t:150},{d:2,t:300},{d:3,t:450},{d:4,t:600}].forEach(p => {
                setTimeout(() => {
                    const wave = dots.filter(d => d.dist === p.d);
                    wave.forEach(d => d.element.classList.add('ripple'));
                    setTimeout(() => wave.forEach(d => d.element.classList.remove('ripple')), 250);
                }, p.t);
            });
        }

        function runLoaderErase() {
            dots.forEach(d => d.element.classList.remove('ripple'));
            [0,1,2,3,4].forEach(dist => {
                setTimeout(() => {
                    dots.filter(d => d.dist === dist).forEach(d => d.element.classList.add('erase'));
                }, dist * 150);
            });
        }

        // --- INITIALISATION DES CARTES ---
        for (let i = 0; i < numberOfCards; i++) {
            const card = document.createElement('model-viewer');
            card.src = 'card3d.glb';
            card.setAttribute('environment-image', 'neutral');
            card.setAttribute('exposure', '1.5'); 
            card.setAttribute('interaction-prompt', 'none');
            card.setAttribute('camera-orbit', '-28deg 89deg auto');
            card.setAttribute('camera-target', '0m 0.08m 0m');
            card.setAttribute('bounds', 'tight');
            card.setAttribute('field-of-view', '30deg');

            const hitbox = document.createElement('div');
            hitbox.className = 'hitbox';
            card.appendChild(hitbox);

            container.appendChild(card);
            cardsData.push({ element: card, angle: (360 / numberOfCards) * i });
        }

        // --- BOUCLE D'ANIMATION ---
        function animate() {
            if (!animationActive) return;

            // Appliquer la friction pour ralentir après une impulsion
            currentSpeed = Math.max(baseSpeed, currentSpeed * friction);

            cardsData.forEach((data, index) => {
                data.angle += currentSpeed;
                if (data.angle >= 360) data.angle -= 360;

                const radian = data.angle * (Math.PI / 180);
                
                // Mouvement parallaxe souris
                const mouseMoveX = mousePos.x * (window.innerWidth * 0.05); 
                const mouseMoveY = mousePos.y * (window.innerHeight * 0.03);
                
                const x = (Math.cos(radian) * finalRadius) + mouseMoveX;
                const y = (Math.sin(radian) * finalRadius) + finalRadius + 20 + (index * 0.1) + mouseMoveY; 
                
                // Inclinaison de la carte vers la souris
                data.element.cameraOrbit = `${-28 + (mousePos.x * 12)}deg ${89 + (mousePos.y * 12)}deg auto`;
                
                const rotationZ = data.angle - 270;
                const distFromCenter = Math.abs(data.angle - 270);
                const blurAmount = Math.max(0, (distFromCenter - 35) / 14);

                data.element.style.setProperty('--pos-x', `${x}px`);
                data.element.style.setProperty('--pos-y', `${y}px`);
                data.element.style.setProperty('--rot-z', `${rotationZ}deg`);
                data.element.style.setProperty('--current-blur', `blur(${blurAmount}px)`);

                if (!data.element.querySelector('.hitbox:hover')) {
                    data.element.style.transform = `translate(${x}px, ${y}px) rotate(${rotationZ}deg) translateZ(${index}px)`;
                    data.element.style.zIndex = Math.floor(data.angle);
                }

                // Gestion de l'opacité sur l'arc
                data.element.style.opacity = (data.angle > 140 && data.angle < 400) ? "1" : "0";
                data.element.style.filter = `blur(${blurAmount}px)`;
            });

            requestAnimationFrame(animate);
        }

        // --- GESTION DU CHARGEMENT (2s) ---
        window.addEventListener('load', () => {
            runLoaderRipple();
            loaderInt = setInterval(runLoaderRipple, 1500);

            setTimeout(() => {
                clearInterval(loaderInt);
                runLoaderErase();
                setTimeout(() => {
                    loader.classList.add('loader-hidden');
                    setTimeout(() => {
                        animationActive = true; 
                        animate(); 
                        container.classList.add('visible');
                    }, 400); // Écran blanc
                }, 800); // Temps d'effacement
            }, 1800); // Temps total loader
        });

        // --- INTERACTION SOURIS ET TOUCH ---
        window.addEventListener('resize', () => { finalRadius = getDynamicRadius(); });

        window.addEventListener('wheel', (e) => {
            if (!animationActive) return;
            currentSpeed = Math.min(2.5, currentSpeed + Math.abs(e.deltaY) * 0.001);
        }, { passive: true });

        window.addEventListener("mousemove", (e) => {
            mousePos.x = (e.clientX / window.innerWidth) - 0.5;
            mousePos.y = (e.clientY / window.innerHeight) - 0.5;
        });

        // Support Tactile (Inclinaison + Swipe)
        let lastTouchY = 0;
        window.addEventListener("touchstart", (e) => { lastTouchY = e.touches[0].clientY; }, { passive: true });
        window.addEventListener("touchmove", (e) => {
            if (!animationActive) return;
            const currentTouchY = e.touches[0].clientY;
            const delta = Math.abs(lastTouchY - currentTouchY);
            currentSpeed = Math.min(2.2, currentSpeed + delta * 0.002);
            lastTouchY = currentTouchY;

            mousePos.x = (e.touches[0].clientX / window.innerWidth) - 0.5;
            mousePos.y = (e.touches[0].clientY / window.innerHeight) - 0.5;
        }, { passive: true });
    </script>
</body>
</html>
