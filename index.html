<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrousel 3D Preven6 - Fixed Light & 2s Loader</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            padding: 0;
            background-color: #ffffff; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
        }

        /* --- STYLE DU LOADER (40px, 2 secondes) --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #dot-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 4px; 
            width: 40px; 
            height: 40px;
        }

        .dot {
            width: 100%; 
            height: 100%;
            background-color: #001DFC;
            border-radius: 50%;
            transform-origin: center;
            opacity: 1;
            transition: background-color 0.3s ease, transform 0.3s ease, opacity 0.6s ease; 
        }

        .dot.ripple {
            background-color: #00FFFF;
            transform: scale(1.1);
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        .dot.erase {
            opacity: 0;
            transform: scale(0.3);
        }

        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* --- CONTAINER --- */
        #card-arc-container {
            position: relative;
            width: 100vw;
            height: 650px; 
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            isolation: isolate; 
            overflow: hidden; 
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        #card-arc-container.visible {
            opacity: 1;
        }

        model-viewer {
            position: absolute;
            width: 400px; 
            height: 600px;
            bottom: -50px;
            --poster-color: transparent;
            transform-origin: center center;
            backface-visibility: hidden;
            will-change: transform;
            contain: layout; 
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            pointer-events: none; 
        }

        .hitbox {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 240px; 
            height: 360px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto; 
            background: transparent;
            z-index: 10;
        }

        model-viewer:has(.hitbox:hover) {
            transform: translate(var(--pos-x), calc(var(--pos-y) - 65px)) rotate(var(--rot-z)) translateZ(-30px) !important;
            filter: var(--current-blur) !important; 
        }
    </style>
</head>
<body>

    <div id="loader">
        <div id="dot-grid"></div>
    </div>

    <div id="card-arc-container"></div>

    <script>
        const container = document.getElementById('card-arc-container');
        const loader = document.getElementById('loader');
        const dotGrid = document.getElementById('dot-grid');
        const numberOfCards = 12; 
        const finalRadius = 550;       
        const baseSpeed = 0.07;
        
        let currentSpeed = 0.5; 
        const frictionIntro = 0.985;
        const frictionScroll = 0.96;
        
        let cardsData = [];
        let mousePos = { x: 0, y: 0 };
        let animationActive = false;
        let loaderAnimationInterval;

        // Génération de la grille
        const rows = 5, cols = 5, dots = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dotGrid.appendChild(dot);
                dots.push({
                    element: dot,
                    dist: Math.abs(r - 2) + Math.abs(c - 2)
                });
            }
        }

        const waveParams = [
            { dist: 0, delay: 0 },
            { dist: 1, delay: 150 },
            { dist: 2, delay: 300 },
            { dist: 3, delay: 450 },
            { dist: 4, delay: 600 }
        ];

        function runLoaderRipple() {
            dots.forEach(d => d.element.classList.remove('ripple'));
            waveParams.forEach(param => {
                setTimeout(() => {
                    const waveDots = dots.filter(d => d.dist === param.dist);
                    waveDots.forEach(d => d.element.classList.add('ripple'));
                    setTimeout(() => {
                        waveDots.forEach(d => d.element.classList.remove('ripple'));
                    }, 250);
                }, param.delay);
            });
        }

        function runLoaderErase() {
            dots.forEach(d => d.element.classList.remove('ripple'));
            waveParams.forEach(param => {
                setTimeout(() => {
                    dots.filter(d => d.dist === param.dist).forEach(d => d.element.classList.add('erase'));
                }, param.delay);
            });
        }

        // Initialisation des cartes
        for (let i = 0; i < numberOfCards; i++) {
            const card = document.createElement('model-viewer');
            card.src = 'card3d.glb';
            // Utilisation d'un éclairage global fixe et neutre
            card.setAttribute('environment-image', 'neutral');
            card.setAttribute('exposure', '1.8'); 
            card.setAttribute('interaction-prompt', 'none');
            card.setAttribute('camera-orbit', '-28deg 89deg auto');
            card.setAttribute('camera-target', '0m 0.08m 0m');
            card.setAttribute('bounds', 'tight');
            card.setAttribute('field-of-view', '30deg');

            const hitbox = document.createElement('div');
            hitbox.className = 'hitbox';
            card.appendChild(hitbox);

            container.appendChild(card);
            cardsData.push({ element: card, angle: (360 / numberOfCards) * i });
        }

        function animate() {
            if (!animationActive) return;

            if (currentSpeed > baseSpeed) {
                currentSpeed *= frictionIntro;
            } else {
                currentSpeed = baseSpeed;
            }

            cardsData.forEach((data, index) => {
                data.angle += currentSpeed;
                if (data.angle >= 360) data.angle -= 360;

                const r = finalRadius;
                const radian = data.angle * (Math.PI / 180);
                
                const mouseMoveX = mousePos.x * 40; 
                const mouseMoveY = mousePos.y * 20;
                const x = (Math.cos(radian) * r) + mouseMoveX;
                const y = (Math.sin(radian) * r) + finalRadius + 20 + (index * 0.1) + mouseMoveY; 
                
                data.element.cameraOrbit = `${-28 + (mousePos.x * 12)}deg ${89 + (mousePos.y * 12)}deg auto`;
                data.element.cameraTarget = `${mousePos.x * 0.15}m ${0.08 - (mousePos.y * 0.15)}m 0m`;

                const rotationZ = data.angle - 270;
                const distFromCenter = Math.abs(data.angle - 270);
                const blurAmount = Math.max(0, (distFromCenter - 35) / 14);

                data.element.style.setProperty('--pos-x', `${x}px`);
                data.element.style.setProperty('--pos-y', `${y}px`);
                data.element.style.setProperty('--rot-z', `${rotationZ}deg`);
                data.element.style.setProperty('--current-blur', `blur(${blurAmount}px)`);

                if (!data.element.querySelector('.hitbox:hover')) {
                    data.element.style.transform = `translate(${x}px, ${y}px) rotate(${rotationZ}deg) translateZ(${index * 1}px)`;
                    data.element.style.zIndex = Math.floor(data.angle);
                }

                if (data.angle > 160 && data.angle < 380) {
                    data.element.style.opacity = "1";
                    data.element.style.filter = `blur(${blurAmount}px)`;
                } else {
                    data.element.style.opacity = "0";
                    data.element.style.filter = "none";
                }
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('load', () => {
            runLoaderRipple();
            loaderAnimationInterval = setInterval(runLoaderRipple, 1500);

            setTimeout(() => {
                clearInterval(loaderAnimationInterval);
                runLoaderErase();

                setTimeout(() => {
                    loader.classList.add('loader-hidden');
                    setTimeout(() => {
                        animationActive = true; 
                        animate(); 
                        container.classList.add('visible');
                    }, 400); // Délai d'écran blanc
                }, 800); // Temps pour l'onde d'effacement
            }, 1800); // Durée totale du loader ~2s
        });

        window.addEventListener('wheel', (e) => {
            if (!animationActive) return;
            currentSpeed += Math.abs(e.deltaY) * 0.0012;
            if (currentSpeed > 2.0) currentSpeed = 2.0;
        }, { passive: true });

        window.addEventListener("mousemove", (e) => {
            mousePos.x = (e.clientX / window.innerWidth) - 0.5;
            mousePos.y = (e.clientY / window.innerHeight) - 0.5;
        });
    </script>
</body>
</html>
